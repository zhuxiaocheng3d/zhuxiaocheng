<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>朱小橙3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #faf9f8;
            --card-bg: #ffffff;
            --text-primary: #1e1e2f;
            --text-secondary: #5a5a6e;
            --accent: #F4987C;
            --accent-hover: #e07a5c;
            --border-light: #eaeef2;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 30px -12px rgba(0,0,0,0.15);
            --transition: all 0.25s ease;
        }

        body.dark {
            --bg-color: #121212;
            --card-bg: #1f1f2c;
            --text-primary: #efefef;
            --text-secondary: #b0b0c0;
            --border-light: #2a2a36;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 24px 20px 60px;
            transition: var(--transition);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--border-light); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 8px; }

        .header {
            max-width: 1600px;
            margin: 0 auto 32px;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 500;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        .sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-bottom: 1px dashed var(--border-light);
            display: inline-block;
            padding-bottom: 8px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 28px auto 20px;
            max-width: 1000px;
            align-items: center;
        }
        .btn {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(0.97);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            border-color: var(--accent);
        }
        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 5px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.85rem;
            width: 180px;
            color: var(--text-primary);
        }
        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .gallery {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            transition: all 0.2s;
        }
        .gallery.waterfall {
            display: block;
            column-count: 4;
            column-gap: 24px;
        }
        .gallery.waterfall .card {
            break-inside: avoid;
            margin-bottom: 24px;
        }
        @media (max-width: 1100px) { .gallery.waterfall { column-count: 3; } }
        @media (max-width: 800px) { .gallery.waterfall { column-count: 2; } }
        @media (max-width: 550px) {
            .gallery { grid-template-columns: 1fr; }
            .gallery.waterfall { column-count: 1; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-light);
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }
        .media-wrapper {
            position: relative;
            background: #00000010;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4 / 3;
        }
        .media-wrapper img, .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .card:hover .media-wrapper img,
        .card:hover .media-wrapper video {
            transform: scale(1.03);
        }
        .media-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            color: white;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 40px;
            z-index: 2;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .date-badge {
            background: var(--accent);
            color: #1e1e2f;
        }
        .volume-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 30px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 14px;
            z-index: 3;
            transition: 0.2s;
        }
        .volume-btn:hover {
            background: var(--accent);
            transform: scale(1.05);
        }
        .card-info {
            padding: 14px 16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
        }
        .card-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.3;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            flex: 1;
        }
        .link-icon {
            background: var(--border-light);
            border-radius: 30px;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: 0.2s;
            flex-shrink: 0;
        }
        .link-icon:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }
        .loader {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-light);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer-tip {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 48px;
            opacity: 0.6;
        }
        @media (max-width: 640px) {
            body { padding: 16px; }
            .toolbar { gap: 8px; }
            .btn { padding: 5px 12px; font-size: 0.75rem; }
            .search-box input { width: 130px; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>📸 朱小橙 · 3D视觉志</h1>
    <div class="sub">智能日期标签 · 动态链接 · 沉浸浏览</div>
</div>

<div class="toolbar">
    <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="搜索作品名...">
    </div>
    <button id="themeToggleBtn" class="btn">🌙 暗色模式</button>
    <button id="layoutToggleBtn" class="btn">📐 瀑布流</button>
    <button id="globalMuteBtn" class="btn">🔇 全局静音</button>
    <span style="font-size:12px; color:var(--text-secondary);">✨ 视频悬停播放·双击全屏</span>
</div>

<div id="galleryContainer" class="gallery">
    <div class="loader"><div class="spinner"></div>正在载入作品集...</div>
</div>
<div class="footer-tip">⭐ 每张作品支持同名txt链接 · 日期自动标徽 · 视频双击全屏/悬停播放</div>

<div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:10000; justify-content:center; align-items:center; backdrop-filter:blur(8px);">
    <div style="position:relative; max-width:90vw; max-height:90vh;">
        <button id="closeModalBtn" style="position:absolute; top:-40px; right:-10px; background:var(--accent); border:none; color:white; font-size:24px; width:36px; height:36px; border-radius:50%; cursor:pointer;">×</button>
        <video id="modalVideoPlayer" controls controlsList="nodownload" style="max-width:100%; max-height:90vh; border-radius:20px;"></video>
    </div>
</div>

<script>
    let mediaItems = [];
    let currentLayout = "grid";
    let globalMuted = true;
    let currentSearchTerm = "";

    const gallery = document.getElementById('galleryContainer');
    const themeBtn = document.getElementById('themeToggleBtn');
    const layoutBtn = document.getElementById('layoutToggleBtn');
    const globalMuteBtn = document.getElementById('globalMuteBtn');
    const searchInput = document.getElementById('searchInput');
    const modal = document.getElementById('videoModal');
    const modalVideo = document.getElementById('modalVideoPlayer');
    const closeModal = document.getElementById('closeModalBtn');

    function renderGallery() {
        if (!gallery) return;
        let filtered = mediaItems;
        if (currentSearchTerm.trim()) {
            const term = currentSearchTerm.trim().toLowerCase();
            filtered = mediaItems.filter(item => item.displayTitle.toLowerCase().includes(term));
        }
        if (filtered.length === 0) {
            gallery.innerHTML = `<div class="loader" style="grid-column:1/-1;">✨ 没有找到相关作品，换个关键词试试～</div>`;
            return;
        }
        const fragment = document.createDocumentFragment();
        filtered.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            const mediaWrapper = document.createElement('div');
            mediaWrapper.className = 'media-wrapper';
            const badgeDiv = document.createElement('div');
            badgeDiv.className = 'media-badge';
            if (item.dateLabel) {
                const dateSpan = document.createElement('span');
                dateSpan.className = 'date-badge';
                dateSpan.innerText = `📅 ${item.dateLabel}`;
                badgeDiv.appendChild(dateSpan);
            } else {
                const defaultSpan = document.createElement('span');
                defaultSpan.innerText = item.mediaType === 'video' ? '🎬 影像' : '🖼️ 静帧';
                badgeDiv.appendChild(defaultSpan);
            }
            if (item.mediaType === 'video') {
                const videoHint = document.createElement('span');
                videoHint.innerText = '▶ 悬停播放';
                videoHint.style.background = "#000000aa";
                videoHint.style.borderRadius = "20px";
                videoHint.style.fontSize = "0.65rem";
                videoHint.style.padding = "2px 8px";
                badgeDiv.appendChild(videoHint);
            }
            mediaWrapper.appendChild(badgeDiv);

            let mediaElement;
            if (item.mediaType === 'video') {
                const videoElem = document.createElement('video');
                videoElem.loop = true;
                videoElem.playsInline = true;
                videoElem.preload = "metadata";
                videoElem.muted = globalMuted;
                const source = document.createElement('source');
                source.src = item.url;
                source.type = 'video/mp4';
                videoElem.appendChild(source);
                videoElem.addEventListener('mouseenter', () => { if (videoElem.paused) videoElem.play().catch(e=>{}); });
                videoElem.addEventListener('mouseleave', () => { if (!videoElem.paused) { videoElem.pause(); if(videoElem.currentTime) videoElem.currentTime = 0; } });
                videoElem.addEventListener('dblclick', (e) => { e.stopPropagation(); modalVideo.src = item.url; modalVideo.muted = globalMuted; modal.style.display = 'flex'; modalVideo.play().catch(e=>{}); });
                mediaElement = videoElem;
                const volumeCtrl = document.createElement('button');
                volumeCtrl.className = 'volume-btn';
                volumeCtrl.innerHTML = globalMuted ? '🔇' : '🔊';
                volumeCtrl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    videoElem.muted = !videoElem.muted;
                    volumeCtrl.innerHTML = videoElem.muted ? '🔇' : '🔊';
                });
                mediaWrapper.appendChild(volumeCtrl);
            } else {
                const imgElem = document.createElement('img');
                imgElem.src = item.url;
                imgElem.alt = item.displayTitle;
                imgElem.loading = 'lazy';
                mediaElement = imgElem;
            }
            mediaWrapper.appendChild(mediaElement);
            card.appendChild(mediaWrapper);

            const infoDiv = document.createElement('div');
            infoDiv.className = 'card-info';
            const titleSpan = document.createElement('span');
            titleSpan.className = 'card-title';
            titleSpan.innerText = item.displayTitle;
            infoDiv.appendChild(titleSpan);
            if (item.linkUrl && item.linkUrl.trim()) {
                const linkA = document.createElement('a');
                linkA.href = item.linkUrl;
                linkA.target = "_blank";
                linkA.rel = "noopener noreferrer";
                linkA.className = 'link-icon';
                linkA.innerHTML = '🔗';
                infoDiv.appendChild(linkA);
            } else {
                const emptySpan = document.createElement('span');
                emptySpan.style.width = '32px';
                infoDiv.appendChild(emptySpan);
            }
            card.appendChild(infoDiv);
            fragment.appendChild(card);
        });
        gallery.innerHTML = '';
        gallery.appendChild(fragment);
        applyLayoutClass();
        syncGlobalMute();
    }

    function syncGlobalMute() {
        document.querySelectorAll('.media-wrapper video').forEach(video => { video.muted = globalMuted; });
        document.querySelectorAll('.volume-btn').forEach(btn => { btn.innerHTML = globalMuted ? '🔇' : '🔊'; });
    }

    function applyLayoutClass() {
        if (!gallery) return;
        if (currentLayout === 'waterfall') {
            gallery.classList.add('waterfall');
            gallery.classList.remove('grid');
        } else {
            gallery.classList.remove('waterfall');
            gallery.classList.add('grid');
        }
    }

    function toggleLayout() {
        currentLayout = currentLayout === 'grid' ? 'waterfall' : 'grid';
        layoutBtn.innerHTML = currentLayout === 'grid' ? '📐 瀑布流' : '🌊 网格视图';
        applyLayoutClass();
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        themeBtn.innerHTML = isDark ? '☀️ 亮色模式' : '🌙 暗色模式';
        localStorage.setItem('userTheme', isDark ? 'dark' : 'light');
    }

    function toggleGlobalMute() {
        globalMuted = !globalMuted;
        globalMuteBtn.innerHTML = globalMuted ? '🔇 全局静音' : '🔊 全局有声';
        localStorage.setItem('globalMuted', globalMuted);
        syncGlobalMute();
    }

    async function loadMediaData() {
        try {
            const res = await fetch('images.json?t=' + Date.now());
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (Array.isArray(data)) mediaItems = data;
            else throw new Error('索引格式无效');
            renderGallery();
        } catch (err) {
            gallery.innerHTML = `<div class="loader"><div>⚠️ 未找到作品索引 (images.json)</div>
            <div style="font-size:0.85rem; margin-top:12px;">请先运行 node generate.js 扫描 tu 文件夹并上传生成的 images.json。<br>确保 tu 文件夹内含图片/视频及同名txt链接文件。</div></div>`;
        }
    }

    function initModal() {
        closeModal.addEventListener('click', () => { modal.style.display = 'none'; modalVideo.pause(); modalVideo.src = ''; });
        modal.addEventListener('click', (e) => { if (e.target === modal) { modal.style.display = 'none'; modalVideo.pause(); modalVideo.src = ''; } });
    }

    function loadPreferences() {
        const savedTheme = localStorage.getItem('userTheme');
        if (savedTheme === 'dark') { document.body.classList.add('dark'); themeBtn.innerHTML = '☀️ 亮色模式'; }
        const savedMute = localStorage.getItem('globalMuted');
        if (savedMute !== null) globalMuted = savedMute === 'true';
        globalMuteBtn.innerHTML = globalMuted ? '🔇 全局静音' : '🔊 全局有声';
    }

    function bindEvents() {
        themeBtn.addEventListener('click', toggleTheme);
        layoutBtn.addEventListener('click', toggleLayout);
        globalMuteBtn.addEventListener('click', toggleGlobalMute);
        searchInput.addEventListener('input', (e) => { currentSearchTerm = e.target.value; renderGallery(); });
    }

    function init() {
        loadPreferences();
        bindEvents();
        initModal();
        loadMediaData();
    }
    init();
</script>
</body>
</html>
